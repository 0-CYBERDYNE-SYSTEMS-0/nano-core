<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Messaging Pipeline — 3-System Comparison</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --hermes: #f47067; --hermes-fill: rgba(244,112,103,0.10); --hermes-border: rgba(244,112,103,0.5);
    --fft: #3fb950; --fft-fill: rgba(63,185,80,0.10); --fft-border: rgba(63,185,80,0.5);
    --oc: #58a6ff; --oc-fill: rgba(88,166,255,0.10); --oc-border: rgba(88,166,255,0.5);
    --shared: #8b949e; --shared-fill: rgba(139,148,158,0.08); --shared-border: rgba(139,148,158,0.4);
    --warn: #d29922; --warn-fill: rgba(210,153,34,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size:13px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  #topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; z-index:10; }
  #topbar h1 { font-size:14px; font-weight:600; white-space:nowrap; }
  .sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
  .sl { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.6px; white-space:nowrap; }
  .tb { border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:11px; padding:3px 10px; border-radius:5px; cursor:pointer; transition:all .12s; white-space:nowrap; }
  .tb:hover { background:var(--border); color:var(--text); }
  .tb.a-hermes { background:var(--hermes); border-color:var(--hermes); color:#fff; }
  .tb.a-fft { background:var(--fft); border-color:var(--fft); color:#fff; }
  .tb.a-oc { background:var(--oc); border-color:var(--oc); color:#fff; }
  .tb.a-overlay { background:var(--accent); border-color:var(--accent); color:#fff; }
  .tb.a-preset { background:var(--warn); border-color:var(--warn); color:#fff; }
  .legend { display:flex; gap:12px; margin-left:auto; font-size:10px; color:var(--muted); align-items:center; flex-wrap:wrap; }
  .ldot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:3px; vertical-align:middle; }

  #main { flex:1; display:flex; overflow:hidden; }
  #canvas-wrap { flex:1; position:relative; overflow:auto; background:var(--bg); }
  #canvas-wrap svg { display:block; }
  #annotations { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

  #detail { width:340px; background:var(--surface); border-left:1px solid var(--border); display:none; flex-direction:column; overflow-y:auto; padding:14px; position:relative; }
  #detail.open { display:flex; }
  #detail h2 { font-size:14px; margin-bottom:2px; }
  .d-sub { color:var(--muted); font-size:11px; font-family:'SF Mono',Monaco,Consolas,monospace; margin-bottom:8px; }
  .d-badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:8px; margin-bottom:8px; margin-right:4px; }
  .d-desc { font-size:12px; line-height:1.55; color:#c9d1d9; margin-bottom:12px; white-space:pre-wrap; }
  .d-compare { margin-bottom:12px; }
  .d-compare h3 { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px; }
  .cmp-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:8px; }
  .cmp-cell { padding:6px 8px; border-radius:6px; font-size:11px; line-height:1.4; }
  .cmp-cell h4 { font-size:10px; font-weight:600; margin-bottom:3px; text-transform:uppercase; letter-spacing:.3px; }
  .cmp-hermes { background:var(--hermes-fill); border:1px solid var(--hermes-border); }
  .cmp-hermes h4 { color:var(--hermes); }
  .cmp-fft { background:var(--fft-fill); border:1px solid var(--fft-border); }
  .cmp-fft h4 { color:var(--fft); }
  .cmp-oc { background:var(--oc-fill); border:1px solid var(--oc-border); }
  .cmp-oc h4 { color:var(--oc); }
  .warn-box { background:var(--warn-fill); border:1px solid rgba(210,153,34,0.4); border-radius:6px; padding:8px; font-size:11px; line-height:1.4; margin-bottom:10px; }
  .warn-label { color:var(--warn); font-weight:700; }
  .conn-sect { margin-bottom:10px; }
  .conn-sect h3 { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
  .ci { font-size:11px; padding:2px 0; display:flex; align-items:center; gap:5px; }
  .cd { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .close-btn { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; }
  .close-btn:hover { color:var(--text); }
  .cmt-area { margin-top:8px; border-top:1px solid var(--border); padding-top:8px; }
  .cmt-area textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:#c9d1d9; font-size:11px; padding:6px; resize:vertical; min-height:40px; font-family:inherit; }
  .cmt-area textarea:focus { outline:none; border-color:var(--accent); }
  .add-btn { background:#238636; border:1px solid #2ea043; color:#fff; font-size:11px; padding:3px 10px; border-radius:5px; cursor:pointer; margin-top:4px; }
  .cmt-list { list-style:none; margin-top:4px; }
  .cmt-list li { background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:5px; margin-bottom:3px; font-size:11px; position:relative; }
  .cmt-list li .del { position:absolute; top:2px; right:4px; background:none; border:none; color:#f85149; cursor:pointer; font-size:12px; }

  #prompt-panel { background:var(--surface); border-top:1px solid var(--border); }
  #prompt-toggle { display:flex; align-items:center; justify-content:space-between; padding:6px 14px; cursor:pointer; }
  #prompt-toggle span { font-size:11px; color:var(--muted); }
  .arrow { transition:transform .2s; }
  .arrow.open { transform:rotate(180deg); }
  #prompt-body { display:none; padding:0 14px 10px; overflow-y:auto; max-height:160px; }
  #prompt-body.open { display:block; }
  #prompt-text { background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:8px; font-size:11px; font-family:'SF Mono',Monaco,Consolas,monospace; color:#c9d1d9; white-space:pre-wrap; line-height:1.45; }
  .copy-btn { background:var(--surface2); border:1px solid var(--border); color:#c9d1d9; font-size:10px; padding:2px 8px; border-radius:4px; cursor:pointer; margin-top:4px; float:right; }
  .copy-btn.copied { background:#238636; border-color:#2ea043; color:#fff; }

  .node-g { cursor:pointer; }
  .node-g:hover rect.nr { filter:brightness(1.3); }
  .node-g.selected rect.nr { stroke-width:2.5 !important; stroke:var(--accent) !important; }
  .node-g.dimmed { opacity:.08; pointer-events:none; }
  .conn-path { fill:none; stroke-width:1.5; stroke-dasharray:6,4; animation:flowDash .8s linear infinite; }
  .conn-path.dimmed { opacity:.06; animation:none; }
  @keyframes flowDash { to { stroke-dashoffset:-20; } }

  .ann-card { position:absolute; background:var(--surface); border:1px solid var(--warn); border-radius:8px; padding:10px 12px; font-size:10px; line-height:1.5; max-width:280px; box-shadow:0 4px 12px rgba(0,0,0,.5); pointer-events:auto; z-index:5; }
  .ann-title { font-weight:700; color:var(--warn); margin-bottom:5px; font-size:11px; }
  .ann-row { display:flex; gap:5px; margin-bottom:3px; }
  .ann-lbl { font-weight:700; flex-shrink:0; width:22px; font-size:10px; }
  .ann-lbl-h { color:var(--hermes); }
  .ann-lbl-f { color:var(--fft); }
  .ann-lbl-o { color:var(--oc); }

  .warn-badge { font-size:7px; font-weight:700; }
</style>
</head>
<body>
<div id="topbar">
  <h1>Telegram Messaging Comparison</h1>
  <div class="sep"></div>
  <span class="sl">System</span>
  <div id="sys-btns"></div>
  <div class="sep"></div>
  <span class="sl">Focus</span>
  <div id="preset-btns"></div>
  <div class="sep"></div>
  <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;">
    <input type="checkbox" id="show-ann" checked style="accent-color:var(--warn);"> Annotations
  </label>
  <div class="legend">
    <span><span class="ldot" style="background:var(--hermes)"></span>Hermes</span>
    <span><span class="ldot" style="background:var(--fft)"></span>FFT_nano</span>
    <span><span class="ldot" style="background:var(--oc)"></span>OpenClaw</span>
    <span><span class="ldot" style="background:var(--shared)"></span>Shared</span>
    <span><span class="ldot" style="background:var(--warn)"></span>Issue</span>
  </div>
</div>
<div id="main">
  <div id="canvas-wrap">
    <svg id="svg" viewBox="0 0 1300 1020" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="annotations"></div>
  </div>
  <div id="detail">
    <button class="close-btn" id="close-btn">&times;</button>
    <h2 id="d-title"></h2>
    <div class="d-sub" id="d-sub"></div>
    <div id="d-badges"></div>
    <div class="d-desc" id="d-desc"></div>
    <div id="d-warn"></div>
    <div id="d-compare"></div>
    <div class="conn-sect"><h3>Inbound</h3><div id="d-in"></div></div>
    <div class="conn-sect"><h3>Outbound</h3><div id="d-out"></div></div>
    <div class="cmt-area">
      <h3 style="font-size:11px;color:var(--muted);margin-bottom:4px;">Comments</h3>
      <textarea id="cmt-input" placeholder="Add a note..."></textarea>
      <button class="add-btn" id="add-cmt">Add</button>
      <ul class="cmt-list" id="cmt-list"></ul>
    </div>
  </div>
</div>
<div id="prompt-panel">
  <div id="prompt-toggle"><span>Prompt Output</span><span class="arrow">&#9650;</span></div>
  <div id="prompt-body">
    <div id="prompt-text"></div>
    <button class="copy-btn" id="copy-btn">Copy</button>
  </div>
</div>

<script>
(function(){
'use strict';

var STAGES = [
  { id:'inbound',   label:'INBOUND',            y:20,  h:85,  color:'#d29922' },
  { id:'routing',   label:'ROUTING',             y:115, h:85,  color:'#58a6ff' },
  { id:'agent',     label:'AGENT EXECUTION',     y:210, h:85,  color:'#3fb950' },
  { id:'streaming', label:'STREAMING / PREVIEW', y:305, h:170, color:'#bc8cff' },
  { id:'tools',     label:'TOOL DISPLAY',        y:485, h:85,  color:'#f0883e' },
  { id:'delivery',  label:'FINAL DELIVERY',      y:580, h:165, color:'#da3633' },
  { id:'errors',    label:'ERROR RECOVERY',       y:755, h:85,  color:'#768390' },
  { id:'result',    label:'USER RESULT',          y:870, h:80,  color:'#e6edf3' },
];

var nodes = [
  // INBOUND
  { id:'tg-api',       label:'Telegram Bot API',       sub:'getUpdates / webhook',     sys:'shared',  stage:'inbound',   x:370, y:35, w:160, h:42,
    desc:'All three systems poll Telegram via getUpdates or webhooks.',
    compare:{ h:'python-telegram-bot long-poll', f:'Custom polling loop in telegram.ts', o:'grammY framework with offset watermarking' } },
  { id:'h-parse',      label:'Text Buffering',          sub:'0.6s debounce',            sys:'hermes',  stage:'inbound',   x:80,  y:35, w:145, h:42,
    desc:'Buffers rapid text messages with 0.6s debounce. Merges album media groups. Downloads and caches media locally to survive Telegram 1-hour file URL expiry.' },
  { id:'f-parse',      label:'Event Parsing',           sub:'TelegramInboundEvent',     sys:'fft',     stage:'inbound',   x:560, y:35, w:145, h:42,
    desc:'Parses raw Telegram updates into TelegramInboundEvent union type (message or callback_query). No debouncing \u2014 each update processed immediately.' },
  { id:'o-parse',      label:'Sequentialized Inbound',  sub:'debounce + fragment merge', sys:'openclaw',stage:'inbound',   x:780, y:35, w:170, h:42,
    desc:'Sophisticated inbound pipeline: per-chat sequentialization middleware, media group buffering, text fragment assembly (1500ms buffer, max 12 parts/50KB). Forwarded bursts get 80ms debounce vs 1000ms+ for normal.' },

  // ROUTING
  { id:'h-auth',       label:'Auth Check',              sub:'allowlist / pairing code', sys:'hermes',  stage:'routing',   x:80,  y:130, w:145, h:42,
    desc:'Checks users against allowlists or pairing codes. Unauthorized DM users receive pairing codes; group users silently ignored.' },
  { id:'f-route',      label:'Group Registry + Cmds',   sub:'registered_groups.json',   sys:'fft',     stage:'routing',   x:440, y:130, w:170, h:42,
    desc:'Checks registered_groups.json. Handles /slash commands via telegram-commands.ts (1351 lines). Auto-registers groups on first trigger.',
    compare:{ h:'Simple allowlist/pairing', f:'Group registry + 1351-line command handler', o:'Session engine with hierarchical config matching' } },
  { id:'o-session',    label:'Session Engine',           sub:'Gateway WebSocket + binding',sys:'openclaw',stage:'routing', x:780, y:130, w:170, h:42,
    desc:'Central WebSocket gateway (port 18789). Deterministic session binding: exact peer \u2192 parent \u2192 guild \u2192 default priority. Persistent thread bindings with auto-expiration (24h idle, 60s sweep).' },
  { id:'sh-store',     label:'Message Store',            sub:'Persist inbound message',  sys:'shared',  stage:'routing',   x:260, y:130, w:150, h:42,
    desc:'All three persist inbound messages before processing.',
    compare:{ h:'SQLite + JSONL sessions', f:'SQLite messages table via storeMessage()', o:'Session-scoped JSON files' } },

  // AGENT EXECUTION
  { id:'h-agent',      label:'Synchronous LLM Call',    sub:'await chat_completion()',   sys:'hermes',  stage:'agent',     x:80,  y:225, w:155, h:42,
    desc:'Runs agent synchronously \u2014 calls LLM API, waits for COMPLETE response, then processes. No streaming of partial results. Tool calls handled in loop: call \u2192 execute \u2192 call again.',
    compare:{ h:'Sync: wait for full response', f:'Stream: JSON events from subprocess stdout', o:'Stream: RPC channel via WebSocket gateway' } },
  { id:'f-agent',      label:'PI Subprocess',           sub:'child_process.spawn()',     sys:'fft',     stage:'agent',     x:490, y:225, w:155, h:42,
    desc:'Spawns PI as child process with --mode json. Streams JSON events on stdout: text deltas, tool starts/completions, errors. Think level controls reasoning depth (off through xhigh).' },
  { id:'o-agent',      label:'Agent via RPC',           sub:'Gateway WebSocket channel', sys:'openclaw',stage:'agent',     x:830, y:225, w:155, h:42,
    desc:'Agent communicates via bidirectional RPC through WebSocket gateway. Supports tool profiles (coding/messaging/minimal). Multi-agent routing with isolated workspaces.' },

  // STREAMING / PREVIEW
  { id:'h-nostream',   label:'No Streaming',            sub:'Agent runs to completion',  sys:'hermes',  stage:'streaming', x:80,  y:320, w:155, h:42,
    desc:'Hermes does NOT stream to Telegram. Agent runs fully, then sends complete response. User sees typing indicator until done.',
    compare:{ h:'No streaming at all', f:'EventEmitter \u2192 send+edit (+ legacy IPC)', o:'Draft lanes \u2192 send+edit fallback' } },

  { id:'f-eventhub',   label:'Runtime Event Hub',       sub:'PiRuntimeEventHub',        sys:'fft',     stage:'streaming', x:440, y:320, w:165, h:42,
    desc:'New EventEmitter-based hub (73 lines). PI Runner emits telegram_preview_requested events as text deltas arrive. Replaces file-based IPC for host-local delivery. Ordered processor ensures sequential handling.' },
  { id:'f-preview',    label:'Preview Registry',        sub:'TelegramPreviewRegistry',  sys:'fft',     stage:'streaming', x:440, y:380, w:165, h:42,
    desc:'Receives events from hub. First delta: sendStreamMessage() creates visible message. Subsequent: editStreamMessage() updates it. Tracks state per runKey (chatJid:requestId). Deduplicates unchanged text.',
    issues:['Rate-limit silencing: if send fails, disables ALL updates for 30min \u2014 user gets silence','No graceful degradation \u2014 either streaming works or complete silence'] },
  { id:'f-ipc-legacy', label:'IPC Files (Legacy)',      sub:'data/ipc/{group}/messages/',sys:'fft',     stage:'streaming', x:630, y:380, w:165, h:42,
    desc:'Legacy file-based IPC. Still in codebase but NOT used for host-local preview delivery. PI Runner now emits events instead. Only remains for cross-boundary sandbox IPC (agent-authored files).',
    issues:['Dead code path for preview delivery','Still polluted in IPC watcher loop'] },
  { id:'f-draft-legacy',label:'Draft IPC (Dead)',       sub:'telegram-draft-ipc.ts',    sys:'fft',     stage:'streaming', x:630, y:440, w:165, h:42,
    desc:'sendTelegramDraftWithFallback() \u2014 tried native sendMessageDraft API, fell back to send+edit. NEVER CALLED anymore. PI Runner uses EventEmitter path. 247 lines of dead code.',
    issues:['Entire module is dead code \u2014 never called','Adds complexity to completion state resolution','Should be removed'] },

  { id:'o-draft',      label:'Draft Lane',              sub:'sendMessageDraft API',     sys:'openclaw',stage:'streaming', x:830, y:320, w:165, h:42,
    desc:'Uses Telegram native sendMessageDraft API for invisible preview. Draft ID allocation prevents concurrent reuse. Configurable throttling (default 1000ms, min 250ms). 4096-char ceiling.' },
  { id:'o-msg-edit',   label:'Message+Edit Fallback',   sub:'sendMessage \u2192 editMessage',sys:'openclaw',stage:'streaming', x:830, y:380, w:165, h:42,
    desc:'Fallback when draft mode fails. Creates permanent message via sendMessage, updates via editMessageText. Generation counter detects superseded responses from delayed API calls.' },
  { id:'o-debounce',   label:'Stream Debouncing',       sub:'Min char threshold',       sys:'openclaw',stage:'streaming', x:830, y:440, w:165, h:42,
    desc:'Prevents sending initial previews until minimum character threshold met. Improves notification quality \u2014 users don\'t get pinged for partial words.' },

  // TOOL DISPLAY
  { id:'h-tools',      label:'No Tool Display',         sub:'Tools run silently',       sys:'hermes',  stage:'tools',     x:80,  y:500, w:155, h:42,
    desc:'Tool calls execute silently. User only sees final result text. No intermediate progress.' },
  { id:'f-tools',      label:'Verbose Progress Msgs',   sub:'Separate send+edit message',sys:'fft',    stage:'tools',     x:440, y:500, w:165, h:42,
    desc:'Tool progress sent as SEPARATE message from preview text. Two messages updating independently. Four modes: off/new/all/verbose. Sequential promise-chain queue. Per-tool emoji mapping.',
    issues:['Tool progress is a separate message from main preview','User sees two messages updating independently \u2014 confusing','No visual grouping between tool progress and response text'],
    compare:{ h:'No display', f:'Separate message with 4 verbose modes', o:'Status reactions on the message itself' } },
  { id:'o-tools',      label:'Status Reactions',        sub:'Message reactions API',    sys:'openclaw',stage:'tools',     x:830, y:500, w:165, h:42,
    desc:'Uses Telegram message reactions to show status: thinking, tool executing (by name), compacting, done, error. Minimal visual footprint. Status attached to the message itself, not a separate message.' },

  // FINAL DELIVERY
  { id:'h-send',       label:'Send Final Message',      sub:'send_message()',           sys:'hermes',  stage:'delivery',  x:80,  y:600, w:155, h:42,
    desc:'Simple: format message, chunk if >4096, send each chunk. First chunk replies to original. MarkdownV2 with plain text fallback on parse failure.' },
  { id:'h-chunk',      label:'Simple Chunking',         sub:'4096 char split',          sys:'hermes',  stage:'delivery',  x:80,  y:660, w:155, h:42,
    desc:'Splits at 4096 boundary. Adds "(1/2)" labels with escaped parentheses for MarkdownV2. No HTML-aware splitting.' },
  { id:'h-think',      label:'Optional Reasoning',      sub:'/reasoning toggle',        sys:'hermes',  stage:'delivery',  x:80,  y:720, w:155, h:42,
    desc:'User can enable reasoning display via /reasoning command. When on, thinking prepended as: "Reasoning:\\n```\\n{thinking}\\n```". Long reasoning (15+ lines) auto-collapsed.' },

  { id:'f-complete',   label:'Completion Resolver',     sub:'resolveTelegramStream...',  sys:'fft',     stage:'delivery',  x:440, y:595, w:165, h:42,
    desc:'resolveTelegramStreamCompletionState() checks: was response streamed? Was it externally completed? What\'s the preview state? Decides: edit existing, send new, or delete+resend.',
    issues:['Has dual-path logic for legacy streaming state no longer used','Completion state resolution overly complex for single active path'] },
  { id:'f-finalize',   label:'Finalize Preview',        sub:'edit or delete+resend',    sys:'fft',     stage:'delivery',  x:440, y:655, w:165, h:42,
    desc:'If streamed: tries to edit preview message with final text. If attachments detected: deletes preview, sends new with media. If >4000 chars: edits first chunk, sends rest as new messages.',
    issues:['Multi-chunk finalization: edit chunk 1, send chunks 2+ as new messages','Jarring UX \u2014 user sees preview transform then additional messages appear','No HTML-aware chunking \u2014 can split mid-tag'] },
  { id:'f-format',     label:'Telegram Formatter',      sub:'splitTelegramText(4000)',  sys:'fft',     stage:'delivery',  x:630, y:655, w:165, h:42,
    desc:'Markdown to Telegram HTML conversion. splitTelegramText() chunks at 4000 chars (safe margin under 4096). Preserves code blocks across splits. Escapes HTML entities.',
    issues:['Not HTML-aware: can split inside open tags','No tag balancing across chunks unlike OpenClaw'] },
  { id:'f-think',      label:'Thinking: Never Shown',   sub:'Filtered during parsing',  sys:'fft',     stage:'delivery',  x:630, y:595, w:165, h:42,
    desc:'Thinking content is NEVER shown to the user. Filtered out during pi-runner stdout delta extraction. Only assistant role text passes through. No toggle to enable.' },

  { id:'o-finalize',   label:'Stream Finalization',     sub:'Draft \u2192 permanent message',sys:'openclaw',stage:'delivery',  x:830, y:595, w:165, h:42,
    desc:'Three-phase: 1) Stop draft lanes, flush buffered content. 2) Materialize drafts into permanent messages. 3) Archive/delete preview messages. Fire-and-forget auto-topic renaming for DM threads.' },
  { id:'o-chunk',      label:'HTML-Aware Chunking',     sub:'Tag-balanced splitting',   sys:'openclaw',stage:'delivery',  x:830, y:655, w:165, h:42,
    desc:'Intelligent chunking: tracks HTML overhead separately from plain text length. splitTelegramHtmlChunks() maintains proper tag nesting across boundaries. Wraps file references to prevent link preview. Merges whitespace-only chunks.' },
  { id:'o-status',     label:'Status Updates',          sub:'Reactions: done/error',    sys:'openclaw',stage:'delivery',  x:830, y:720, w:165, h:42,
    desc:'Updates status reactions: removes thinking indicator, sets done or error. Graceful \u2014 if reaction API fails, continues without blocking delivery.' },

  // ERROR RECOVERY
  { id:'h-retry',      label:'3 Retries + Backoff',     sub:'2^n second delay',         sys:'hermes',  stage:'errors',    x:80,  y:770, w:155, h:42,
    desc:'Up to 3 attempts per chunk. Exponential backoff (1s, 2s). Detects Telegram retry_after headers. Falls back to plain text if MarkdownV2 fails.' },
  { id:'f-retry',      label:'4 Retries + Disable',     sub:'300-2500ms backoff',       sys:'fft',     stage:'errors',    x:440, y:770, w:165, h:42,
    desc:'TELEGRAM_RETRY_ATTEMPTS=4 with 300-2500ms exponential backoff for API calls. BUT: preview streaming has separate error handling \u2014 on first failure, disables ALL preview updates for 30 MINUTES.',
    issues:['Preview failure disables updates for 30 minutes \u2014 too aggressive','User gets complete silence instead of degraded service','No per-request retry for preview \u2014 one failure kills the run\'s streaming','Other systems retry per-request; FFT silences per-run'] },
  { id:'o-retry',      label:'3-Tier API Fallback',     sub:'DNS \u2192 IPv4 \u2192 pinned IP',  sys:'openclaw',stage:'errors',    x:830, y:770, w:165, h:42,
    desc:'Three escalating fallbacks: 1) Default dispatcher. 2) IPv4-only fallback (sticky after first success). 3) Pinned IP fallback (149.154.167.220) if DNS fails. HTML parse failure \u2192 retry as plain text. Thread not found \u2192 retry without thread params.',
    compare:{ h:'3 retries, exponential backoff', f:'4 retries for API, but preview disabled 30min on failure', o:'3-tier fallback: DNS \u2192 IPv4 \u2192 pinned IP + graceful degradation' } },

  // RESULT
  { id:'user-result',  label:'USER SEES RESPONSE',     sub:'Formatted reply in Telegram',sys:'shared', stage:'result',    x:370, y:895, w:200, h:46,
    desc:'The final response the user sees in Telegram.' },
];

var connections = [
  { from:'tg-api', to:'h-parse',    sys:'hermes',  group:'inbound' },
  { from:'tg-api', to:'f-parse',    sys:'fft',     group:'inbound' },
  { from:'tg-api', to:'o-parse',    sys:'openclaw', group:'inbound' },
  { from:'h-parse',  to:'h-auth',     sys:'hermes',  group:'routing' },
  { from:'h-auth',   to:'sh-store',   sys:'hermes',  group:'routing' },
  { from:'f-parse',  to:'f-route',    sys:'fft',     group:'routing' },
  { from:'f-route',  to:'sh-store',   sys:'fft',     group:'routing' },
  { from:'o-parse',  to:'o-session',  sys:'openclaw', group:'routing' },
  { from:'o-session',to:'sh-store',   sys:'openclaw', group:'routing' },
  { from:'sh-store', to:'h-agent',    sys:'hermes',  group:'agent' },
  { from:'sh-store', to:'f-agent',    sys:'fft',     group:'agent' },
  { from:'sh-store', to:'o-agent',    sys:'openclaw', group:'agent' },
  { from:'h-agent',  to:'h-nostream', sys:'hermes',  group:'streaming' },
  { from:'f-agent',  to:'f-eventhub', sys:'fft',     group:'streaming' },
  { from:'f-eventhub',to:'f-preview', sys:'fft',     group:'streaming' },
  { from:'f-agent',  to:'f-ipc-legacy',sys:'fft',    group:'streaming' },
  { from:'f-ipc-legacy',to:'f-draft-legacy',sys:'fft',group:'streaming' },
  { from:'o-agent',  to:'o-draft',    sys:'openclaw', group:'streaming' },
  { from:'o-draft',  to:'o-msg-edit', sys:'openclaw', group:'streaming' },
  { from:'o-msg-edit',to:'o-debounce',sys:'openclaw', group:'streaming' },
  { from:'f-agent',  to:'f-tools',    sys:'fft',     group:'tools' },
  { from:'o-agent',  to:'o-tools',    sys:'openclaw', group:'tools' },
  { from:'h-nostream',to:'h-send',    sys:'hermes',  group:'delivery' },
  { from:'h-send',   to:'h-chunk',    sys:'hermes',  group:'delivery' },
  { from:'h-chunk',  to:'h-think',    sys:'hermes',  group:'delivery' },
  { from:'f-preview', to:'f-complete', sys:'fft',     group:'delivery' },
  { from:'f-complete',to:'f-finalize', sys:'fft',     group:'delivery' },
  { from:'f-complete',to:'f-think',    sys:'fft',     group:'delivery' },
  { from:'f-finalize',to:'f-format',   sys:'fft',     group:'delivery' },
  { from:'o-debounce',to:'o-finalize', sys:'openclaw', group:'delivery' },
  { from:'o-finalize',to:'o-chunk',    sys:'openclaw', group:'delivery' },
  { from:'o-chunk',   to:'o-status',   sys:'openclaw', group:'delivery' },
  { from:'h-send',    to:'h-retry',    sys:'hermes',  group:'errors' },
  { from:'f-preview', to:'f-retry',    sys:'fft',     group:'errors' },
  { from:'f-finalize',to:'f-retry',    sys:'fft',     group:'errors' },
  { from:'o-finalize',to:'o-retry',    sys:'openclaw', group:'errors' },
  { from:'h-think',   to:'user-result',sys:'hermes',  group:'result' },
  { from:'f-format',  to:'user-result',sys:'fft',     group:'result' },
  { from:'o-status',  to:'user-result',sys:'openclaw', group:'result' },
];

var ANNOTATIONS = [
  { id:'inbound',   title:'Inbound Processing', x:110, y:78,
    h:'0.6s debounce, album merge, media caching',
    f:'No debounce \u2014 immediate processing',
    o:'Per-chat sequentialization, 1500ms text fragment merge, media group buffer' },
  { id:'streaming', title:'Streaming Strategy', x:350, y:460,
    h:'No streaming. Wait for full response.',
    f:'EventEmitter \u2192 send+edit. Legacy IPC path dead but still in code.',
    o:'Native draft API \u2192 send+edit fallback. Stream debouncing prevents notification spam.' },
  { id:'tools',     title:'Tool Progress Visibility', x:350, y:540,
    h:'Silent. No display.',
    f:'SEPARATE message from preview. Two messages updating independently.',
    o:'Status REACTIONS on the message itself. Minimal footprint.' },
  { id:'delivery',  title:'Final Delivery', x:350, y:735,
    h:'Simple send. MarkdownV2 \u2192 plain text fallback.',
    f:'Edit preview or delete+resend. Multi-chunk splits into multiple messages.',
    o:'Materialize draft \u2192 permanent. HTML-aware tag-balanced chunking.' },
  { id:'errors',    title:'Error Recovery', x:350, y:830,
    h:'3 retries, exponential backoff.',
    f:'4 API retries OK, but preview failure silences run for 30 MINUTES.',
    o:'3-tier fallback (DNS\u2192IPv4\u2192pinned IP). Per-request retry, never silences.' },
];

var PRESETS = {
  full:      { label:'Full Pipeline', stages:null, groups:null, annotations:null },
  inbound:   { label:'Inbound',      stages:['inbound','routing'],   groups:['inbound','routing'], annotations:['inbound'] },
  streaming: { label:'Streaming',    stages:['agent','streaming','tools'], groups:['agent','streaming','tools'], annotations:['streaming','tools'] },
  delivery:  { label:'Delivery',     stages:['delivery','result'],   groups:['delivery','result'], annotations:['delivery'] },
  errors:    { label:'Errors',       stages:['errors','delivery'],   groups:['errors','delivery'], annotations:['errors'] },
};

var state = {
  mode: 'overlay',
  preset: 'full',
  showAnn: true,
  selected: null,
  comments: JSON.parse(localStorage.getItem('tg-msg-cmp-comments') || '{}'),
};
function saveComments() { localStorage.setItem('tg-msg-cmp-comments', JSON.stringify(state.comments)); }

var svg = document.getElementById('svg');
var NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs, parent) {
  var e = document.createElementNS(NS, tag);
  for (var k in attrs) if (attrs[k] != null) e.setAttribute(k, String(attrs[k]));
  if (parent) parent.appendChild(e);
  return e;
}
function clear(e) { while (e.firstChild) e.removeChild(e.firstChild); }

function sysStroke(sys) {
  if (sys === 'hermes') return '#f47067';
  if (sys === 'fft') return '#3fb950';
  if (sys === 'openclaw') return '#58a6ff';
  return '#8b949e';
}
function sysFill(sys) {
  if (sys === 'hermes') return 'rgba(244,112,103,0.10)';
  if (sys === 'fft') return 'rgba(63,185,80,0.10)';
  if (sys === 'openclaw') return 'rgba(88,166,255,0.10)';
  return 'rgba(139,148,158,0.08)';
}

function isNodeVisible(n) {
  var preset = PRESETS[state.preset];
  if (preset.stages && preset.stages.indexOf(n.stage) < 0) return false;
  if (state.mode !== 'overlay') {
    if (n.sys === 'shared') return true;
    if (state.mode === 'hermes' && n.sys !== 'hermes') return false;
    if (state.mode === 'fft' && n.sys !== 'fft') return false;
    if (state.mode === 'openclaw' && n.sys !== 'openclaw') return false;
  }
  return true;
}
function isConnVisible(c) {
  var preset = PRESETS[state.preset];
  if (preset.groups && preset.groups.indexOf(c.group) < 0) return false;
  var fn = nodes.find(function(n){ return n.id===c.from; });
  var tn = nodes.find(function(n){ return n.id===c.to; });
  if (!fn || !tn || !isNodeVisible(fn) || !isNodeVisible(tn)) return false;
  if (state.mode !== 'overlay' && c.sys !== 'shared' && c.sys !== state.mode) return false;
  return true;
}

function getCenter(n) { return { x:n.x+n.w/2, y:n.y+n.h/2 }; }
function computePath(c) {
  var fn = nodes.find(function(n){ return n.id===c.from; });
  var tn = nodes.find(function(n){ return n.id===c.to; });
  if (!fn || !tn) return '';
  var a = getCenter(fn), b = getCenter(tn);
  var dx = b.x-a.x, dy = b.y-a.y;
  var sx,sy,ex,ey;
  if (Math.abs(dx) > Math.abs(dy)) {
    sx = dx>0 ? fn.x+fn.w : fn.x; ex = dx>0 ? tn.x : tn.x+tn.w;
    sy = a.y; ey = b.y;
  } else {
    sy = dy>0 ? fn.y+fn.h : fn.y; ey = dy>0 ? tn.y : tn.y+tn.h;
    sx = a.x; ex = b.x;
  }
  return 'M '+sx+','+sy+' C '+(sx+(ex-sx)*.35)+','+sy+' '+(sx+(ex-sx)*.65)+','+ey+' '+ex+','+ey;
}
function hexToRgb(h) { return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16); }

function render() {
  clear(svg);
  var defs = svgEl('defs',{},svg);
  [['arrow-h','#f47067'],['arrow-f','#3fb950'],['arrow-o','#58a6ff'],['arrow-s','#8b949e']].forEach(function(p){
    var m = svgEl('marker',{id:p[0],markerWidth:'8',markerHeight:'6',refX:'7',refY:'3',orient:'auto'},defs);
    svgEl('polygon',{points:'0 0, 8 3, 0 6',fill:p[1]},m);
  });

  STAGES.forEach(function(s){
    var preset = PRESETS[state.preset];
    if (preset.stages && preset.stages.indexOf(s.id) < 0) return;
    svgEl('rect',{ x:20, y:s.y, width:1260, height:s.h, rx:10, fill:'none', stroke:'rgba('+hexToRgb(s.color)+',0.12)', 'stroke-width':1, 'stroke-dasharray':'6,4' },svg);
    var t = svgEl('text',{ x:30, y:s.y+14, fill:'rgba('+hexToRgb(s.color)+',0.3)', style:'font-size:10px;font-weight:600;letter-spacing:.8px' },svg);
    t.textContent = s.label;
  });

  connections.forEach(function(c){
    var vis = isConnVisible(c);
    var d = computePath(c);
    if (!d) return;
    var col = sysStroke(c.sys);
    var mid = c.sys==='hermes'?'arrow-h':c.sys==='fft'?'arrow-f':c.sys==='openclaw'?'arrow-o':'arrow-s';
    svgEl('path',{ d:d, class:'conn-path'+(vis?'':' dimmed'), stroke:col, 'marker-end':'url(#'+mid+')' },svg);
  });

  nodes.forEach(function(n){
    var vis = isNodeVisible(n);
    var sel = state.selected === n.id;
    var classes = 'node-g'+(vis?'':' dimmed')+(sel?' selected':'');
    var g = svgEl('g',{class:classes,style:'--glow:'+sysStroke(n.sys)},svg);
    g.addEventListener('click',function(e){ e.stopPropagation(); selectNode(n.id); });

    svgEl('rect',{
      x:n.x, y:n.y, width:n.w, height:n.h, rx:8,
      fill:vis?sysFill(n.sys):'rgba(30,30,30,0.5)',
      stroke:sel?'#58a6ff':(vis?sysStroke(n.sys):'#30363d'),
      'stroke-width':sel?2.5:1.2, class:'nr',
    },g);

    if (n.issues && n.issues.length > 0) {
      svgEl('rect',{ x:n.x+n.w-18, y:n.y+2, width:16, height:11, rx:3, fill:'rgba(210,153,34,0.3)', stroke:'rgba(210,153,34,0.6)', 'stroke-width':.5 },g);
      var wb = svgEl('text',{ x:n.x+n.w-10, y:n.y+10, fill:'#d29922', 'text-anchor':'middle', class:'warn-badge' },g);
      wb.textContent = '\u26A0';
    }

    if (state.comments[n.id] && state.comments[n.id].length) {
      svgEl('circle',{ cx:n.x+n.w-6, cy:n.y+n.h-6, r:4, fill:'#f0883e' },g);
      var ct = svgEl('text',{ x:n.x+n.w-6, y:n.y+n.h-3.5, fill:'#fff', 'font-size':'6', 'text-anchor':'middle', 'font-weight':'bold' },g);
      ct.textContent = state.comments[n.id].length;
    }

    var isEnd = n.id === 'user-result';
    var lbl = svgEl('text',{ x:n.x+n.w/2, y:n.y+(n.sub?15:20), fill:'#e6edf3', 'font-size':isEnd?'12':'10.5', 'font-weight':'600', 'text-anchor':'middle' },g);
    lbl.textContent = n.label;
    if (n.sub) {
      var sub = svgEl('text',{ x:n.x+n.w/2, y:n.y+29, fill:'#8b949e', 'font-size':'7.5', 'text-anchor':'middle', 'font-family':"'SF Mono',Monaco,Consolas,monospace" },g);
      sub.textContent = n.sub;
    }
  });
}

function renderAnnotations() {
  var container = document.getElementById('annotations');
  clear(container);
  if (!state.showAnn || state.mode !== 'overlay') return;
  var preset = PRESETS[state.preset];
  var allowed = preset.annotations;
  var svgRect = svg.getBoundingClientRect();
  var vb = svg.viewBox.baseVal;
  var scX = svgRect.width / vb.width, scY = svgRect.height / vb.height;
  var sc = Math.min(scX, scY);
  var offX = (svgRect.width - vb.width * sc) / 2;
  var offY = (svgRect.height - vb.height * sc) / 2;

  ANNOTATIONS.forEach(function(ann){
    if (allowed && allowed.indexOf(ann.id) < 0) return;
    var card = document.createElement('div');
    card.className = 'ann-card';
    card.style.left = (ann.x * sc + offX) + 'px';
    card.style.top = (ann.y * sc + offY) + 'px';
    var title = document.createElement('div');
    title.className = 'ann-title';
    title.textContent = '\u2605 ' + ann.title;
    card.appendChild(title);
    [['H:','ann-lbl-h',ann.h],['F:','ann-lbl-f',ann.f],['O:','ann-lbl-o',ann.o]].forEach(function(r){
      var row = document.createElement('div');
      row.className = 'ann-row';
      var lbl = document.createElement('span');
      lbl.className = 'ann-lbl ' + r[1];
      lbl.textContent = r[0];
      row.appendChild(lbl);
      row.appendChild(document.createTextNode(r[2]));
      card.appendChild(row);
    });
    container.appendChild(card);
  });
}

function selectNode(id) {
  state.selected = id;
  var n = nodes.find(function(n){ return n.id===id; });
  document.getElementById('d-title').textContent = n.label;
  document.getElementById('d-sub').textContent = n.sub;

  var badges = document.getElementById('d-badges');
  clear(badges);
  var sysLabel = n.sys==='hermes'?'Hermes':n.sys==='fft'?'FFT_nano':n.sys==='openclaw'?'OpenClaw':'Shared';
  var b = document.createElement('span');
  b.className = 'd-badge';
  b.style.background = sysFill(n.sys);
  b.style.color = sysStroke(n.sys);
  b.style.border = '1px solid ' + sysStroke(n.sys);
  b.textContent = sysLabel;
  badges.appendChild(b);
  var stage = STAGES.find(function(s){ return s.id===n.stage; });
  if (stage) {
    var sb = document.createElement('span');
    sb.className = 'd-badge';
    sb.style.background = 'rgba('+hexToRgb(stage.color)+',0.15)';
    sb.style.color = stage.color;
    sb.style.border = '1px solid rgba('+hexToRgb(stage.color)+',0.4)';
    sb.textContent = stage.label;
    badges.appendChild(sb);
  }

  document.getElementById('d-desc').textContent = n.desc;

  var warnDiv = document.getElementById('d-warn');
  clear(warnDiv);
  if (n.issues && n.issues.length) {
    n.issues.forEach(function(issue){
      var box = document.createElement('div');
      box.className = 'warn-box';
      var strong = document.createElement('strong');
      strong.className = 'warn-label';
      strong.textContent = '\u26A0 Issue: ';
      box.appendChild(strong);
      box.appendChild(document.createTextNode(issue));
      warnDiv.appendChild(box);
    });
  }

  var cmpDiv = document.getElementById('d-compare');
  clear(cmpDiv);
  if (n.compare) {
    var h3 = document.createElement('h3');
    h3.style.cssText = 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;';
    h3.textContent = 'Cross-System Comparison';
    cmpDiv.appendChild(h3);
    var row = document.createElement('div');
    row.className = 'cmp-row';
    [['h','Hermes','cmp-hermes'],['f','FFT_nano','cmp-fft'],['o','OpenClaw','cmp-oc']].forEach(function(s){
      if (!n.compare[s[0]]) return;
      var cell = document.createElement('div');
      cell.className = 'cmp-cell ' + s[2];
      var h4 = document.createElement('h4');
      h4.textContent = s[1];
      cell.appendChild(h4);
      cell.appendChild(document.createTextNode(n.compare[s[0]]));
      row.appendChild(cell);
    });
    cmpDiv.appendChild(row);
  }

  var inConns = connections.filter(function(c){ return c.to===id; });
  var outConns = connections.filter(function(c){ return c.from===id; });
  renderConnList('d-in', inConns, 'from');
  renderConnList('d-out', outConns, 'to');
  renderComments(id);
  document.getElementById('detail').classList.add('open');
  updateAll();
}

function renderConnList(elId, conns, dir) {
  var el = document.getElementById(elId);
  clear(el);
  if (!conns.length) {
    var em = document.createElement('div');
    em.className = 'ci'; em.style.color = 'var(--muted)'; em.textContent = 'None';
    el.appendChild(em); return;
  }
  conns.forEach(function(c){
    var peer = nodes.find(function(n){ return n.id===c[dir]; });
    var item = document.createElement('div'); item.className = 'ci';
    var dot = document.createElement('span'); dot.className = 'cd'; dot.style.background = sysStroke(c.sys);
    item.appendChild(dot);
    item.appendChild(document.createTextNode(peer ? peer.label : c[dir]));
    el.appendChild(item);
  });
}

function renderComments(id) {
  var list = document.getElementById('cmt-list');
  clear(list);
  (state.comments[id]||[]).forEach(function(c,i){
    var li = document.createElement('li');
    li.appendChild(document.createTextNode(c.text));
    var del = document.createElement('button');
    del.className = 'del'; del.textContent = '\u00d7';
    del.addEventListener('click',function(){ deleteCmt(id,i); });
    li.appendChild(del);
    list.appendChild(li);
  });
}

function deselect() {
  state.selected = null;
  document.getElementById('detail').classList.remove('open');
  updateAll();
}

function addCmt() {
  if (!state.selected) return;
  var input = document.getElementById('cmt-input');
  var text = input.value.trim();
  if (!text) return;
  if (!state.comments[state.selected]) state.comments[state.selected] = [];
  state.comments[state.selected].push({ text:text });
  input.value = '';
  saveComments();
  renderComments(state.selected);
  updateAll();
}
function deleteCmt(id,i) {
  state.comments[id].splice(i,1);
  if (!state.comments[id].length) delete state.comments[id];
  saveComments();
  renderComments(id);
  updateAll();
}

function updatePrompt() {
  var parts = [];
  parts.push('Telegram messaging pipeline comparison: FFT_nano vs OpenClaw vs Hermes Agent.');
  if (state.mode !== 'overlay') parts.push('Viewing: ' + state.mode + ' only.');
  if (state.preset !== 'full') parts.push('Focus: ' + PRESETS[state.preset].label + '.');
  var issues = [];
  nodes.forEach(function(n){
    if (n.issues && isNodeVisible(n)) n.issues.forEach(function(issue){ issues.push('- ' + n.label + ': ' + issue); });
  });
  if (issues.length) { parts.push('\nFFT_nano issues identified:'); parts.push(issues.join('\n')); }
  var cmtKeys = Object.keys(state.comments);
  if (cmtKeys.length) {
    parts.push('\nFeedback:');
    cmtKeys.forEach(function(id){
      var n = nodes.find(function(n){ return n.id===id; });
      if (!n) return;
      state.comments[id].forEach(function(c){ parts.push('\n**' + n.label + '** (' + n.sub + '): ' + c.text); });
    });
  }
  document.getElementById('prompt-text').textContent = parts.join('\n');
}

function initControls() {
  var sysBtns = document.getElementById('sys-btns');
  [['overlay','Overlay','a-overlay'],['hermes','Hermes','a-hermes'],['fft','FFT_nano','a-fft'],['openclaw','OpenClaw','a-oc']].forEach(function(s){
    var btn = document.createElement('button');
    btn.className = 'tb' + (state.mode===s[0]?' '+s[2]:'');
    btn.textContent = s[1];
    btn.addEventListener('click',function(){
      state.mode = s[0];
      sysBtns.querySelectorAll('.tb').forEach(function(b){ b.className='tb'; });
      btn.className = 'tb ' + s[2];
      updateAll();
    });
    sysBtns.appendChild(btn);
  });

  var presetBtns = document.getElementById('preset-btns');
  Object.keys(PRESETS).forEach(function(key){
    var btn = document.createElement('button');
    btn.className = 'tb' + (state.preset===key?' a-preset':'');
    btn.textContent = PRESETS[key].label;
    btn.addEventListener('click',function(){
      state.preset = key;
      presetBtns.querySelectorAll('.tb').forEach(function(b){ b.className='tb'; });
      btn.className = 'tb a-preset';
      updateAll();
    });
    presetBtns.appendChild(btn);
  });

  document.getElementById('show-ann').addEventListener('change',function(){ state.showAnn = this.checked; updateAll(); });
  document.getElementById('close-btn').addEventListener('click', deselect);
  document.getElementById('add-cmt').addEventListener('click', addCmt);
  document.getElementById('prompt-toggle').addEventListener('click',function(){
    document.getElementById('prompt-body').classList.toggle('open');
    document.querySelector('.arrow').classList.toggle('open');
  });
  document.getElementById('copy-btn').addEventListener('click',function(){
    var text = document.getElementById('prompt-text').textContent;
    navigator.clipboard.writeText(text).then(function(){
      var btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(function(){ btn.textContent='Copy'; btn.classList.remove('copied'); },1500);
    });
  });
  svg.addEventListener('click',function(e){ if (e.target === svg) deselect(); });
}

function updateAll() { render(); renderAnnotations(); updatePrompt(); }
initControls();
updateAll();
})();
</script>
