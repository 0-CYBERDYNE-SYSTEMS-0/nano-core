name: Release Readiness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        uses: gacts/gitleaks@v1
        id: gitleaks
        with:
          run: false

      - name: Scan working tree with gitleaks (no git history)
        run: |
          "${{ steps.gitleaks.outputs.gitleaks-bin }}" dir . --redact --exit-code 1

      - name: Enforce repo secret policy scan
        run: ./scripts/secret-scan.sh

  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Secret scan
        run: npm run secret-scan
      - name: Skill validation
        run: npm run validate:skills

  full-checks:
    runs-on: ubuntu-latest
    needs: [secret-scan, quick-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Release checks
        run: npm run release-check
